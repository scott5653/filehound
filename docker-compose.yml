version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: filehound-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  create-buckets:
    image: python:3-slim
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts/create_buckets.py:/script.py
    entrypoint: ["sh", "-c"]
    command: ["pip install boto3 -q && python3 /script.py"]

volumes:
  minio-data:
    driver: local
